<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Userscripts BY Imsleepy</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 40px;
            background: #0f1115;
            color: white;
            font-family: Arial, sans-serif;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 30px;
        }

        .grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 500px;
        }

        .card {
            display: block;
            background: #1b1f27;
            border: 1px solid #2b3240;
            border-radius: 6px;
            padding: 18px;
            text-decoration: none;
            color: white;
            transition: 0.15s;
        }

        .card:hover {
            border-color: #1f9d55;
            background: #202631;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .desc {
            color: #aeb6c4;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>Userscripts</h1>
    <div class="grid">
        <a class="card" href="./wiki/">
            <div class="title">wiki</div>
            <div class="desc">위키질 할 때 유용한 것들</div>
        </a>

        <a class="card" href="./personnal/">
            <div class="title">personnal</div>
            <div class="desc">개인적으로 쓰는 것들</div>
        </a>

        <a class="card" href="./example/">
            <div class="title">example</div>
            <div class="desc">암것도 업슴</div>
        </a>
    </div>
</body>
</html>
